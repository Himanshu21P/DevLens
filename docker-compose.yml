version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: devlens-db
    restart: always
    environment:
      MYSQL_DATABASE: devlens
      MYSQL_ROOT_PASSWORD: devlens_root_password
      MYSQL_USER: devlens_user
      MYSQL_PASSWORD: devlens_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:alpine
    container_name: devlens-cache
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  mysql_data:
  redis_data:
